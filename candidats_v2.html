<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>JTIPilot — Candidats</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#F4F6FA;--white:#fff;--border:#EDEEF2;--border2:#D8DBE5;
  --text:#1e293b;--text2:#334155;--muted:#94a3b8;--muted2:#64748b;
  --accent:#f97316;--green:#22c55e;--green2:#16a34a;--blue:#3b82f6;
  --amber:#f59e0b;--red:#ef4444;--purple:#a855f7;--cyan:#06b6d4;
  --sans:"IBM Plex Sans",system-ui,sans-serif;
  --mono:"IBM Plex Mono",monospace;
  --r:8px;--r-lg:12px;
  --shadow:0 1px 4px rgba(0,0,0,.07);
  --shadow-md:0 4px 16px rgba(0,0,0,.10);
  --top-h:54px;--side-w:280px;
}
html,body{height:100%;font-family:var(--sans);background:var(--bg);color:var(--text);font-size:14px;overflow:hidden;-webkit-font-smoothing:antialiased;}
button,input,select,textarea{font-family:var(--sans);font-size:14px;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:2px;}

/* TOPBAR */
.topbar{position:fixed;top:0;left:0;right:0;height:var(--top-h);background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:10px;z-index:100;}
.tb-back{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:6px;border:1px solid var(--border);background:var(--white);color:var(--muted2);cursor:pointer;font-size:12px;font-weight:500;transition:all .12s;}
.tb-back:hover{border-color:var(--accent);color:var(--accent);}
.tb-title{font-size:16px;font-weight:600;color:var(--text);}
.tb-right{display:flex;align-items:center;gap:8px;margin-left:auto;}
.btn{padding:7px 14px;border-radius:6px;cursor:pointer;border:none;font-size:12px;font-weight:500;transition:opacity .12s;white-space:nowrap;}
.btn:hover{opacity:.85;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-ghost{background:var(--white);border:1px solid var(--border2);color:var(--muted2);}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent);opacity:1;}
.btn-sm{padding:5px 10px;font-size:11px;}

/* LAYOUT 3 COL */
.layout{position:fixed;top:var(--top-h);left:0;right:0;bottom:0;display:flex;}

/* LEFT — liste vivier */
.side-left{width:var(--side-w);background:var(--white);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;}
.sl-header{padding:10px 12px;border-bottom:1px solid var(--border);}
.sl-search{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:6px;font-size:12px;background:var(--bg);color:var(--text);outline:none;margin-bottom:8px;}
.sl-search:focus{border-color:var(--accent);}
.sl-filters{display:flex;gap:4px;flex-wrap:wrap;}
.sf{padding:3px 8px;font-size:10px;font-weight:500;border:1px solid var(--border);border-radius:12px;cursor:pointer;color:var(--muted2);background:transparent;font-family:var(--mono);transition:all .12s;}
.sf:hover{border-color:var(--muted);}
.sf.on{border-color:var(--accent);color:var(--accent);background:#FFF4EE;}
.sl-pool{display:flex;border-bottom:1px solid var(--border);}
.pool-tab{flex:1;padding:6px 0;text-align:center;font-size:10px;font-weight:600;cursor:pointer;color:var(--muted);font-family:var(--mono);border-bottom:2px solid transparent;transition:all .12s;}
.pool-tab.on{color:var(--accent);border-bottom-color:var(--accent);}
.sl-list{flex:1;overflow-y:auto;}
.cand-row{padding:10px 12px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;}
.cand-row:hover{background:#FAFBFF;}
.cand-row.sel{background:#FFF4EE;}
.cand-row.sel .cr-nom{color:var(--accent);}
.cr-nom{font-size:13px;font-weight:500;color:var(--text);line-height:1.3;}
.cr-sub{font-size:10px;color:var(--muted);margin-top:1px;}
.cr-badges{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap;}
.db{display:inline-block;padding:2px 6px;border-radius:10px;font-size:9px;font-weight:600;font-family:var(--mono);white-space:nowrap;}
.db-dispo{background:#DCFCE7;color:#15803d;}
.db-mission{background:#DBEAFE;color:#1d4ed8;}
.db-preavis{background:#ECFEFF;color:#0e7490;}
.db-indispo{background:#F1F5F9;color:#64748b;}
.db-veille{background:#F3E8FF;color:#7c3aed;}
.sl-empty{padding:20px;text-align:center;font-size:11px;color:var(--muted);font-family:var(--mono);}
.sl-count{font-size:9px;color:var(--muted);font-family:var(--mono);padding:4px 12px;background:#F8F9FB;border-bottom:1px solid var(--border);}

/* CENTER — fiche candidat */
.fiche{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.fiche-tabs{display:flex;border-bottom:2px solid var(--border);background:var(--white);overflow-x:auto;flex-shrink:0;}
.fiche-tab{padding:10px 16px;font-size:11px;font-weight:500;cursor:pointer;color:var(--muted2);border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:all .12s;}
.fiche-tab:hover{color:var(--text);}
.fiche-tab.on{color:var(--accent);border-bottom-color:var(--accent);font-weight:600;}
.fiche-body{flex:1;overflow-y:auto;padding:16px 20px;}

/* Fiche actions header */
.fiche-hd{display:flex;align-items:center;gap:8px;padding:10px 20px;background:var(--white);border-bottom:1px solid var(--border);flex-shrink:0;}
.fiche-hd-nom{font-size:15px;font-weight:600;flex:1;}
.fiche-hd-sub{font-size:11px;color:var(--muted2);}
.fiche-hd-acts{display:flex;gap:5px;}

/* Fields */
.f-section{margin-bottom:20px;}
.f-section-t{font-size:10px;font-weight:600;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;font-family:var(--mono);margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--border);}
.f-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.f-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.f-field{display:flex;flex-direction:column;gap:2px;}
.f-field.full{grid-column:1/-1;}
.f-label{font-size:9px;color:var(--muted);font-family:var(--mono);font-weight:500;letter-spacing:.3px;text-transform:uppercase;}
.f-val{font-size:12px;color:var(--text2);}
.f-inp{
  background:var(--bg);border:1px solid transparent;color:var(--text);
  padding:6px 8px;border-radius:var(--r);font-size:12px;width:100%;
  transition:border .12s;
}
.f-inp:hover{border-color:var(--border);}
.f-inp:focus{border-color:var(--accent);outline:none;background:var(--white);}
select.f-inp{cursor:pointer;}
textarea.f-inp{resize:vertical;min-height:60px;}

/* Statut dispo buttons */
.dispo-btns{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.dispo-btn{padding:6px 14px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:2px solid;transition:all .12s;font-family:var(--mono);}
.dispo-btn.on-dispo{background:#DCFCE7;color:#15803d;border-color:#22c55e;}
.dispo-btn.on-mission{background:#DBEAFE;color:#1d4ed8;border-color:#3b82f6;}
.dispo-btn.on-preavis{background:#ECFEFF;color:#0e7490;border-color:#06b6d4;}
.dispo-btn.on-indispo{background:#F1F5F9;color:#64748b;border-color:#94a3b8;}
.dispo-btn:not(.on-dispo):not(.on-mission):not(.on-preavis):not(.on-indispo){background:transparent;color:var(--muted);border-color:var(--border);}

/* Journal */
.j-entry{display:flex;gap:7px;padding:6px 0;border-bottom:1px solid var(--border);align-items:flex-start;}
.j-entry:last-of-type{border:none;}
.j-tag{font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;white-space:nowrap;flex-shrink:0;font-family:var(--mono);}
.jt-appel{background:#EFF6FF;color:#1d4ed8;}
.jt-email{background:#F3E8FF;color:#7c3aed;}
.jt-mission{background:#DCFCE7;color:#15803d;}
.jt-note{background:#F1F5F9;color:#64748b;}
.jt-relance{background:#FEE2E2;color:#b91c1c;}
.j-date{font-size:10px;color:var(--muted);font-family:var(--mono);flex-shrink:0;}
.j-txt{font-size:12px;flex:1;line-height:1.5;}
.j-del{color:var(--muted);cursor:pointer;font-size:13px;}
.j-del:hover{color:var(--red);}

/* Habilitations */
.hab-cat{margin-bottom:12px;}
.hab-cat-t{font-size:10px;font-weight:700;color:var(--muted2);font-family:var(--mono);margin-bottom:6px;}
.hab-row{display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:6px;border:1px solid var(--border);margin-bottom:4px;background:var(--bg);}
.hab-row.has{border-color:#bbf7d0;background:#F0FDF4;}
.hab-row.exp{border-color:#fca5a5;background:#FFF5F5;}
.hab-chk{width:14px;height:14px;cursor:pointer;flex-shrink:0;}
.hab-lbl{flex:1;font-size:11px;color:var(--text2);}
.hab-date{font-size:10px;font-family:var(--mono);}
.hab-date input{border:none;background:transparent;font-size:10px;font-family:var(--mono);color:var(--muted2);width:90px;}
.hab-badge{font-size:8px;font-weight:700;padding:1px 5px;border-radius:3px;font-family:var(--mono);}
.hb-ok{background:#DCFCE7;color:#15803d;}
.hb-exp{background:#FEE2E2;color:#dc2626;}
.hb-soon{background:#FEF3C7;color:#92400e;}

/* Trajet */
.trajet-box{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:12px;}
.trajet-links{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;}
.trajet-link{padding:5px 10px;border-radius:5px;font-size:11px;font-weight:500;text-decoration:none;display:inline-flex;align-items:center;gap:4px;}
.tl-car{background:#EFF6FF;color:#2563eb;}
.tl-tc{background:#F0FDF4;color:#15803d;}
.tl-cm{background:#ECFEFF;color:#0e7490;}
.tl-vm{background:#FFF4EE;color:var(--accent);}

/* Mission en cours */
.mission-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px;margin-bottom:12px;}
.mc-h{font-size:12px;font-weight:600;color:var(--muted);font-family:var(--mono);margin-bottom:8px;}
.mc-client{font-size:17px;font-weight:600;color:var(--text);}
.mc-dates{font-size:12px;color:var(--muted2);font-family:var(--mono);margin:4px 0;}
.mc-acts{display:flex;gap:6px;flex-wrap:wrap;margin-top:12px;}

/* SMS/Email viewer */
.tpl-cats{display:flex;gap:6px;margin-bottom:10px;}
.tpl-btns{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px;}
.tpl-btn{padding:4px 10px;font-size:10px;font-weight:500;border:1px solid var(--border);border-radius:4px;cursor:pointer;color:var(--muted2);background:transparent;font-family:var(--mono);}
.tpl-btn.on{border-color:var(--accent);color:var(--accent);background:#FFF4EE;}
.tpl-textarea{width:100%;padding:10px;border:1px solid var(--border);border-radius:var(--r);font-size:13px;font-family:var(--mono);color:var(--text);background:var(--bg);resize:vertical;min-height:100px;line-height:1.7;}

/* Modal */
.modal-ov{display:none;position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:600;align-items:center;justify-content:center;padding:20px;}
.modal-ov.open{display:flex;}
.modal-box{background:var(--white);border-radius:var(--r-lg);padding:22px;width:min(520px,95vw);max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-md);}
.modal-box h3{font-size:15px;font-weight:600;margin-bottom:16px;}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.mf{display:flex;flex-direction:column;gap:3px;}
.mf.full{grid-column:1/-1;}
.mf label{font-size:10px;color:var(--muted);font-family:var(--mono);}
.mf input,.mf select,.mf textarea{padding:7px 10px;border:1px solid var(--border);border-radius:var(--r);font-size:12px;color:var(--text);background:var(--bg);width:100%;}
.mf input:focus,.mf select:focus,.mf textarea:focus{border-color:var(--accent);outline:none;}
.modal-foot{display:flex;justify-content:flex-end;gap:8px;margin-top:16px;padding-top:12px;border-top:1px solid var(--border);}

/* RIGHT sidebar — vues */
.side-right{width:200px;background:var(--white);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;}
.sr-section{font-size:9px;font-weight:600;color:var(--muted);letter-spacing:1.2px;text-transform:uppercase;padding:12px 14px 4px;}
.sr-item{display:flex;align-items:center;gap:8px;padding:8px 14px;cursor:pointer;color:var(--muted2);font-size:12px;transition:all .12s;border-right:3px solid transparent;}
.sr-item:hover{background:var(--bg);color:var(--text);}
.sr-item.on{background:#FFF4EE;color:var(--accent);border-right-color:var(--accent);font-weight:500;}
.sr-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}

/* Score fiabilité */
.score-stars{display:flex;gap:2px;}
.star{font-size:14px;}
.star.on{color:var(--amber);}
.star.off{color:#E2E8F0;}

/* Alerte docs */
.doc-alert{background:#FEF3C7;border:1px solid #fcd34d;border-radius:6px;padding:8px 12px;font-size:11px;color:#92400e;margin-bottom:8px;}
.doc-ok{background:#DCFCE7;border:1px solid #bbf7d0;border-radius:6px;padding:8px 12px;font-size:11px;color:#15803d;margin-bottom:8px;}

/* Empty state fiche */
.fiche-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;color:var(--muted);font-family:var(--mono);font-size:12px;}
.fiche-empty-icon{font-size:32px;opacity:.4;}

/* Responsive */
@media(max-width:768px){
  .side-right{display:none;}
  .side-left{width:240px;}
  .fiche-tabs .fiche-tab{padding:8px 10px;font-size:10px;}
}
@media(max-width:480px){
  .side-left{width:100%;position:absolute;z-index:50;border-right:none;bottom:0;top:0;}
  .side-left.hide{display:none;}
  .fiche{width:100%;}
}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <button class="tb-back" onclick="window.location='index.html'">← Accueil</button>
  <div class="tb-title">Base Candidats</div>
  <div class="tb-right">
    <span id="tb-count" style="font-size:11px;color:var(--muted);font-family:var(--mono)"></span>
    <button class="btn btn-ghost btn-sm" onclick="exportCandidats()">Export</button>
    <button class="btn btn-primary btn-sm" onclick="openModalCand()">+ Candidat</button>
  </div>
</div>

<div class="layout">
  <!-- LEFT — Vivier -->
  <div class="side-left" id="side-left">
    <div class="sl-header">
      <input class="sl-search" id="cand-search" type="text" placeholder="Nom, qualif, CP…" oninput="candRenderList()"/>
      <div class="sl-filters">
        <button class="sf on" data-f="" onclick="candSetFilter(this)">TOUS</button>
        <button class="sf" data-f="dispo" onclick="candSetFilter(this)">DISPO</button>
        <button class="sf" data-f="mission" onclick="candSetFilter(this)">MISSION</button>
        <button class="sf" data-f="preavis" onclick="candSetFilter(this)">PRÉAVIS</button>
        <button class="sf" data-f="indispo" onclick="candSetFilter(this)">INDISPO</button>
      </div>
    </div>
    <div class="sl-pool">
      <div class="pool-tab on" onclick="candSetPool('vivier',this)">VIVIER</div>
      <div class="pool-tab" onclick="candSetPool('mission',this)">MISSION</div>
      <div class="pool-tab" onclick="candSetPool('alerte',this)">ALERTES</div>
    </div>
    <div class="sl-count" id="cand-count"></div>
    <div class="sl-list" id="cand-list"></div>
  </div>

  <!-- CENTER — Fiche -->
  <div class="fiche" id="fiche-area">
    <div id="fiche-hd" style="display:none">
      <div class="fiche-hd">
        <div>
          <div class="fiche-hd-nom" id="fhd-nom">—</div>
          <div class="fiche-hd-sub" id="fhd-sub">—</div>
        </div>
        <div class="fiche-hd-acts" id="fhd-acts"></div>
      </div>
      <div class="fiche-tabs" id="fiche-tabs"></div>
    </div>
    <div class="fiche-body" id="fiche-body">
      <div class="fiche-empty">
        <div class="fiche-empty-icon">👤</div>
        <div>Sélectionner un candidat</div>
      </div>
    </div>
  </div>

  <!-- RIGHT — Navigation modules -->
  <div class="side-right">
    <div class="sr-section">Vues</div>
    <div class="sr-item on" onclick="candSetView('list')">
      <div class="sr-dot" style="background:var(--accent)"></div>Vivier
    </div>
    <div class="sr-item" onclick="candSetView('sms')">
      <div class="sr-dot" style="background:var(--blue)"></div>SMS
    </div>
    <div class="sr-item" onclick="candSetView('emails')">
      <div class="sr-dot" style="background:var(--purple)"></div>Emails
    </div>
    <div class="sr-item" onclick="candSetView('marge')">
      <div class="sr-dot" style="background:var(--green)"></div>Marge / Propale
    </div>
    <div class="sr-section">Outils</div>
    <div class="sr-item" onclick="openModalCand()">
      <div class="sr-dot" style="background:var(--muted)"></div>+ Candidat
    </div>
    <div class="sr-item" onclick="exportCandidats()">
      <div class="sr-dot" style="background:var(--muted)"></div>Export XLS
    </div>
    <div class="sr-section">Accès</div>
    <div class="sr-item" onclick="window.location='index.html'">
      <div class="sr-dot" style="background:var(--muted)"></div>← Dashboard
    </div>
    <div class="sr-item" onclick="window.location='index.html#crm'">
      <div class="sr-dot" style="background:var(--muted)"></div>CRM
    </div>
  </div>
</div>

<!-- MODAL NOUVEAU CANDIDAT -->
<div class="modal-ov" id="modal-cand">
  <div class="modal-box">
    <h3 id="modal-cand-title">Nouveau candidat</h3>
    <div class="modal-grid">
      <div class="mf"><label>Nom *</label><input type="text" id="mc-nom"/></div>
      <div class="mf"><label>Prénom *</label><input type="text" id="mc-prenom"/></div>
      <div class="mf"><label>Qualification *</label>
        <select id="mc-qualif">
          <option value="">— Sélectionner —</option>
          <optgroup label="SECOND OEUVRE">
            <option>Plaquiste</option><option>Platrerie / Staff</option>
            <option>Staffeur / Stuqueur</option><option>Peintre en batiment</option>
            <option>Facadier</option><option>Carreleur</option>
            <option>Menuisier Poseur</option><option>Serrurier / Metallier</option>
            <option>Echafaudeur</option><option>Calorifugeur</option>
          </optgroup>
          <optgroup label="GROS OEUVRE">
            <option>Macon</option><option>Coffreur-Bancheur</option>
            <option>Ferrailleur</option><option>Charpentier Bois</option>
            <option>Couvreur</option><option>Etancheur</option>
          </optgroup>
          <optgroup label="CVC / ELECTRICITE">
            <option>Technicien CVC</option><option>Chauffagiste</option>
            <option>Plombier Sanitaire</option><option>Electricien CFO</option>
            <option>Electricien CFA</option>
          </optgroup>
          <optgroup label="ENGINS">
            <option>Conducteur Engins (CACES R482)</option>
            <option>Conducteur Nacelle (PEMP)</option><option>Cariste (CACES R489)</option>
          </optgroup>
          <optgroup label="ENCADREMENT">
            <option>Chef de Chantier</option><option>Chef Equipe</option>
            <option>Conducteur de Travaux</option>
          </optgroup>
        </select></div>
      <div class="mf"><label>Niveau</label>
        <select id="mc-niveau">
          <option value="">—</option><option>N1</option><option>N2</option>
          <option>N3</option><option>N4</option><option>ETAM</option><option>Cadre</option>
        </select></div>
      <div class="mf"><label>Téléphone</label><input type="tel" id="mc-tel"/></div>
      <div class="mf"><label>Email</label><input type="email" id="mc-email"/></div>
      <div class="mf"><label>CP</label><input type="text" id="mc-cp" maxlength="5" oninput="mcCPResolve()"/></div>
      <div class="mf"><label>Ville</label><input type="text" id="mc-ville"/></div>
      <div class="mf"><label>Taux brut (€/h)</label><input type="number" id="mc-taux" step="0.5"/></div>
      <div class="mf"><label>Prétention (€/h)</label><input type="number" id="mc-pretention" step="0.5"/></div>
      <div class="mf"><label>Disponibilité</label>
        <select id="mc-dispo">
          <option value="dispo">Disponible</option><option value="preavis">Préavis</option>
          <option value="indispo">Indisponible</option><option value="mission">En mission</option>
        </select></div>
      <div class="mf"><label>Date dispo</label><input type="date" id="mc-dispo-date"/></div>
      <div class="mf full"><label>Notes</label><textarea id="mc-notes" rows="2"></textarea></div>
    </div>

      <button class="btn btn-ghost btn-sm" onclick="closeModalCand()">Annuler</button>

function candRenderList(){
  var q = ((document.getElementById('cand-search')||{}).value||'').trim().toLowerCase();
  var pool = DB.filter(function(c){
    // Pool filter
    if(candPool==='vivier' && (c.dispo==='mission')) return false;
    if(candPool==='mission' && c.dispo!=='mission') return false;
    if(candPool==='alerte'){
      var hasAlert = false;
      if(c.mission && c.mission.vm_date){ var dl=daysLeft(c.mission.vm_date); if(dl!==null && dl<=30) hasAlert=true; }
      if(!hasAlert) return false;
    }
    // Statut filter
    if(candFilter && c.dispo!==candFilter) return false;
    // Search
    if(q){
      var hay = [c.nom,c.prenom,c.qualif,c.niveau,c.cp,c.ville,c.tel].filter(Boolean).join(' ').toLowerCase();
      return q.split(' ').filter(Boolean).every(function(w){ return hay.indexOf(w)>=0; });
    }
    return true;
  });

  pool.sort(function(a,b){
    var order = {dispo:0,preavis:1,mission:2,indispo:3,veille:4};
    return (order[a.dispo]||9) - (order[b.dispo]||9) || (a.nom||'').localeCompare(b.nom||'');
  });

  var cnt = document.getElementById('cand-count');
  if(cnt) cnt.textContent = pool.length+' / '+DB.length+' candidats';
  var tbCnt = document.getElementById('tb-count');
  if(tbCnt) tbCnt.textContent = DB.length+' candidats';

  var list = document.getElementById('cand-list');
  if(!list) return;
  if(!pool.length){
    list.innerHTML = '<div class="sl-empty">Aucun candidat correspondant</div>';
    return;
  }

  list.innerHTML = pool.map(function(c){
    var d = DISPO_MAP[c.dispo]||DISPO_MAP.indispo;
    var sub = [c.qualif, c.niveau, (c.cp||'')+(c.ville?' — '+c.ville:'')].filter(Boolean).join(' · ');
    return '<div class="cand-row'+(currentId===c.id?' sel':'')+'" data-id="'+c.id+'" onclick="candOpenFiche(this.dataset.id)">'
      + '<div class="cr-nom">'+esc((c.nom||'')+(c.prenom?' '+c.prenom:''))+'</div>'
      + (sub?'<div class="cr-sub">'+esc(sub)+'</div>':'')
      + '<div class="cr-badges"><span class="db '+d.cls+'">'+d.l+'</span>'
      + (c.taux?'<span class="db" style="background:#F1F5F9;color:var(--muted2)">'+c.taux+'€</span>':'')
      + '</div>'
      + '</div>';
  }).join('');
}

function switchTab(tab){

function fl(label){ return '<label class="f-label">'+label+'</label>'; }
function fi(label, id, val, type, tab, field, cid){
  var inp = '';
  if(type==='select-niveau'){
    inp = '<select class="f-inp" id="'+id+'" onchange="saveField(\''+cid+'\',\''+field+'\',this.value)">'
      + ['','N1','N2','N3','N4','ETAM','Cadre'].map(function(v){ return '<option'+(val===v?' selected':'')+'>'+v+'</option>'; }).join('')
      + '</select>';
  } else {
    inp = '<input type="'+type+'" class="f-inp" id="'+id+'" value="'+esc(val)+'" onblur="saveField(\''+cid+'\',\''+field+'\',this.value)"/>';
  }
  return '<div class="f-field">'+fl(label)+inp+'</div>';
}

function renderScore(c){
  var score = calcScore(c);
  var stars = [1,2,3,4,5].map(function(i){
    return '<span class="star '+(i<=score?'on':'off')+'">★</span>';
  }).join('');
  return '<div class="score-stars">'+stars+'</div>'
    + '<div style="font-size:10px;color:var(--muted);font-family:var(--mono);margin-top:4px">'
    + 'Basé sur '+((c.historique||[]).length)+' missions réalisées'
    + '</div>';
}

function calcScore(c){
  var hist = c.historique||[];
  if(!hist.length) return 0;
  var score = 3;
  hist.forEach(function(m){
    if(m.abandon) score--;
    if(m.note_client && m.note_client>=4) score++;
    if(m.note_client && m.note_client<=2) score--;
  });
  return Math.min(5, Math.max(1, Math.round(score)));
}

function calcTrajet(cid){
  var ori = (document.getElementById('tr-ori-'+cid)||{value:''}).value.trim();
  var dest = (document.getElementById('tr-dest-'+cid)||{value:''}).value.trim();
  var res = document.getElementById('tr-result-'+cid);
  if(!dest||!res) return;
  // Calcul via haversine + CP_VILLES_IDF
  var km = estimerDistKm(ori, dest);
  if(km === null){ res.innerHTML = '<span style="color:var(--muted)">CP non reconnu — Distance non calculée</span>'; return; }
  
  // Zone ITR
  var ZONES = [[5,2.20,'Z1 ≤5km'],[10,4.50,'Z2 5→10km'],[20,6.80,'Z3 10→20km'],
    [30,9.15,'Z4 20→30km'],[40,11.50,'Z5 30→40km'],[50,13.85,'Z6 40→50km'],[999,16.20,'Z7 >50km']];
  var zone = ZONES[ZONES.length-1];
  for(var i=0;i<ZONES.length;i++){ if(km<=ZONES[i][0]){ zone=ZONES[i]; break; } }

  var lienVoiture = 'https://www.google.com/maps/dir/'+encodeURIComponent(ori)+'/'+encodeURIComponent(dest);
  var lienTC = 'https://www.google.com/maps/dir/'+encodeURIComponent(ori)+'/'+encodeURIComponent(dest)+'/@,13z/data=!4m2!4m1!3e3';

  res.innerHTML = '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px;">'
    + '<div style="background:var(--bg);border-radius:6px;padding:8px;"><div style="font-size:18px;font-weight:600;">'+Math.round(km)+' km</div><div style="font-size:9px;color:var(--muted)">Distance estimée</div></div>'
    + '<div style="background:var(--bg);border-radius:6px;padding:8px;"><div style="font-size:16px;font-weight:600;color:var(--accent)">'+zone[2]+'</div><div style="font-size:9px;color:var(--muted)">Zone ITR</div></div>'
    + '<div style="background:var(--bg);border-radius:6px;padding:8px;"><div style="font-size:18px;font-weight:600;">'+zone[1].toFixed(2)+'€</div><div style="font-size:9px;color:var(--muted)">ITR / jour</div></div>'
    + '</div>'
    + '<div class="trajet-links">'
    + '<a href="'+lienVoiture+'" target="_blank" class="trajet-link tl-car">🚗 Google Maps voiture</a>'
    + '<a href="'+lienTC+'" target="_blank" class="trajet-link tl-tc">🚌 TC Google Maps</a>'
    + '<a href="https://citymapper.com/directions?startcoord=&endcoord=&lang=fr" target="_blank" class="trajet-link tl-cm">📱 Citymapper</a>'
    + '</div>';
}

function estimerDistKm(ori, dest){
  var cpOri = ori.match(/\b(\d{5})\b/); if(!cpOri) return null;
  var cpDest = dest.match(/\b(\d{5})\b/); if(!cpDest) return null;
  var coordsIDF = {
    '75':{'lat':48.8566,'lng':2.3522},'92':{'lat':48.8240,'lng':2.2363},
    '93':{'lat':48.9340,'lng':2.4692},'94':{'lat':48.7907,'lng':2.4608},
    '91':{'lat':48.6307,'lng':2.4339},'78':{'lat':48.8014,'lng':1.9875},
    '77':{'lat':48.7302,'lng':2.8652},'95':{'lat':49.0343,'lng':2.0834},
  };
  var p1 = coordsIDF[cpOri[1].slice(0,2)];
  var p2 = coordsIDF[cpDest[1].slice(0,2)];
  if(!p1||!p2) return null;
  var R=6371, dLat=(p2.lat-p1.lat)*Math.PI/180, dLng=(p2.lng-p1.lng)*Math.PI/180;
  var a=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(p1.lat*Math.PI/180)*Math.cos(p2.lat*Math.PI/180)*Math.sin(dLng/2)*Math.sin(dLng/2);
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

  currentId=null; candSave(); candRenderList();
  document.getElementById('fiche-hd').style.display='none';
  document.getElementById('fiche-body').innerHTML='<div class="fiche-empty"><div class="fiche-empty-icon">👤</div><div>Sélectionner un candidat</div></div>';
}

function exportCandidats(){
  var blob=new Blob([JSON.stringify(DB,null,2)],{type:'application/json'});
  var a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='candidats_v2_'+today()+'.json'; a.click();
}

// PDF CV simplifié
function genCVPDF(cid){
  var c=DB.find(function(x){ return x.id===cid; });
  if(!c){ alert('Candidat introuvable'); return; }
  if(typeof window.jspdf==='undefined'){ alert('PDF non disponible — vérifiez la connexion internet'); return; }
  var doc=new window.jspdf.jsPDF();
  doc.setFontSize(18); doc.setFont('helvetica','bold');
  doc.text((c.prenom||'')+' '+(c.nom||''), 20, 25);
  doc.setFontSize(13); doc.setFont('helvetica','normal');
  doc.text((c.qualif||'')+(c.niveau?' — Niveau '+c.niveau:''), 20, 35);
  doc.setFontSize(10);
  var y=50;
  if(c.tel){ doc.text('Tél : '+c.tel, 20, y); y+=8; }
  if(c.email){ doc.text('Email : '+c.email, 20, y); y+=8; }
  if(c.cp||c.ville){ doc.text('Localisation : '+(c.cp?c.cp+' ':'')+c.ville, 20, y); y+=8; }
  if(c.taux){ doc.text('Taux brut : '+c.taux+'€/h', 20, y); y+=8; }
  y+=5;
  doc.setFont('helvetica','bold');
  doc.text('Établi par : '+(AGENCE.nom||'—'), 20, y); y+=6;
  doc.setFont('helvetica','italic');
  doc.text(AGENCE.tel||'', 20, y);
  doc.save('CV_'+c.nom+'_'+c.prenom+'_'+today()+'.pdf');
}

function candSetView(v){
  document.querySelectorAll('.sr-item').forEach(function(el){ el.classList.remove('on'); });
  event.currentTarget.classList.add('on');
  currentView = v;
  if(v==='list'){
    document.getElementById('side-left').style.display='flex';
    document.getElementById('fiche-area').style.display='flex';
  }
}

// Récupérer filtre CRM si vient du module CRM
(function() {
  try {
    var fromCRM = sessionStorage.getItem('cand_from_crm');
    var qualifFilter = sessionStorage.getItem('cand_filter_qualif');
    if (fromCRM) {
      sessionStorage.removeItem('cand_from_crm');
      sessionStorage.removeItem('cand_filter_qualif');
      if (qualifFilter) {
        var srch = document.getElementById('cand-search');
        if (srch) {
          srch.value = qualifFilter;
          // Banner info
          var banner = document.createElement('div');
          banner.style.cssText = 'background:#FFF4EE;border:1px solid #f97316;padding:8px 12px;border-radius:6px;font-size:11px;color:#c2410c;font-family:var(--mono);margin-bottom:8px;';
          banner.innerHTML = '🔍 Filtre CRM actif : <strong>' + qualifFilter + '</strong> — <a href="#" onclick="this.parentNode.remove();document.getElementById(\'cand-search\').value=\'\';candRenderList();return false;" style="color:var(--accent)">Effacer</a>';
          var list = document.getElementById('cand-list');
          if (list && list.parentNode) list.parentNode.insertBefore(banner, list);
        }
      }
    }
  } catch(e) {}
})();

candRenderList();
</script>
